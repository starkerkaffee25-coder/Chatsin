<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat</title>

<style>
:root{
  --bg1:#10131a;
  --bg2:#171c26;
  --card:#1d2430;
  --card2:#151a23;
  --line:#2b3445;
  --text:#f2f5fb;
  --muted:#9aa7bd;
  --green:#40c463;
  --green2:#2ea44f;
  --red:#ff6b6b;
  --blue:#59a7ff;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top, #243043 0%, transparent 42%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.hidden{ display:none !important; }

.shell{
  width:min(1180px, 100%);
  min-height:min(92vh, 920px);
  display:flex;
  align-items:stretch;
  justify-content:center;
}

.panel{
  width:100%;
  background:rgba(29,36,48,.94);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  border-radius:24px;
  overflow:hidden;
  backdrop-filter:blur(8px);
}

.app-panel{
  max-width:1180px;
  display:flex;
  flex-direction:column;
  padding:18px;
}

.app-layout{
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:14px;
  height:calc(92vh - 36px);
  min-height:760px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  background:rgba(21,26,35,.96);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:14px 16px;
}

.user-info{
  display:flex;
  align-items:center;
  gap:12px;
}

.user-meta{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.user-name{
  font-size:17px;
  font-weight:800;
}

.user-sub{
  font-size:13px;
  color:var(--muted);
}

.avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  flex:0 0 64px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg, #4f8cff, #7c4dff);
  border:2px solid rgba(255,255,255,.1);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.chat-feed{
  background:rgba(15,20,29,.98);
  border:1px solid #2a3444;
  border-radius:18px;
  overflow-y:auto;
  padding:14px;
}

.chat-list{
  list-style:none;
  padding:0;
  margin:0;
}

.chat-item{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.05);
  word-break:break-word;
  line-height:1.5;
}

.chat-item:last-child{
  border-bottom:none;
}

.chat-row{
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.chat-avatar{
  width:36px;
  height:36px;
  flex:0 0 36px;
  border-radius:50%;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg, #4f8cff, #7c4dff);
  border:1px solid rgba(255,255,255,.08);
}

.chat-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.chat-body{
  flex:1;
  min-width:0;
}

.chat-name{
  font-weight:800;
  color:#bcd2ff;
}

.composer{
  background:rgba(21,26,35,.96);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:14px;
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:12px;
}

input, button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px 14px;
  font-size:15px;
  outline:none;
  box-sizing:border-box;
}

input{
  background:#0f141d;
  color:var(--text);
  border:1px solid #2a3444;
}

input:focus{
  border-color:#4b89ff;
  box-shadow:0 0 0 3px rgba(73,132,255,.18);
}

button{
  cursor:pointer;
  font-weight:700;
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
}

.btn-primary{
  background:linear-gradient(180deg, var(--green), var(--green2));
  color:#fff;
}

.btn-danger{
  background:linear-gradient(180deg, #ff7a7a, #ff5b5b);
  color:#fff;
}

.btn-secondary{
  background:#263143;
  color:var(--text);
  border:1px solid #334155;
}

.message-input{
  min-height:52px;
}

.topbar-actions{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.modal{
  position:fixed;
  inset:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal-backdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.58);
}

.modal-card{
  position:relative;
  width:min(920px, 100%);
  background:rgba(21,26,35,.98);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  box-shadow:0 25px 80px rgba(0,0,0,.45);
  padding:18px;
  z-index:1;
}

.modal-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  margin-bottom:16px;
}

.modal-head h2{
  margin:0 0 6px;
  font-size:24px;
}

.modal-head p{
  margin:0;
  color:var(--muted);
  line-height:1.5;
}

.modal-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.profile-section{
  background:#0f141d;
  border:1px solid #2a3444;
  border-radius:18px;
  padding:16px;
}

.profile-section h3{
  margin:0 0 12px;
  font-size:17px;
}

.profile-section label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin:12px 0 6px;
}

.upload-row{
  display:flex;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
}

.upload-row button{
  width:auto;
  flex:1;
  min-width:140px;
}

.hidden-file{
  display:none;
}

.preview-row{
  display:flex;
  gap:14px;
  align-items:center;
  margin-top:14px;
}

.subtle{
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}

.status-box{
  margin-top:12px;
  color:#d7e2f5;
  font-size:13px;
  min-height:20px;
}

@media (max-width: 820px){
  .composer{
    grid-template-columns:1fr;
  }

  .app-layout{
    min-height:82vh;
  }

  .modal-grid{
    grid-template-columns:1fr;
  }

  .topbar{
    flex-direction:column;
    align-items:stretch;
  }

  .topbar-actions{
    justify-content:stretch;
  }
}
</style>
</head>
<body>

<div class="shell">
  <section class="panel app-panel">
    <div class="app-layout">
      <div class="topbar">
        <div class="user-info">
          <div id="headerAvatar" class="avatar">?</div>
          <div class="user-meta">
            <div id="currentName" class="user-name">Usuário</div>
            <div class="user-sub">Conectado</div>
          </div>
        </div>

        <div class="topbar-actions">
          <button id="btnProfile" class="btn-secondary" type="button" style="width:auto; padding:12px 16px;">Editar perfil</button>
          <button id="btnGames" class="btn-secondary" type="button" style="width:auto; padding:12px 16px;">Jogos</button>
          <button id="btnLogout" class="btn-danger" type="button" style="width:auto; padding:12px 16px;">Sair</button>
        </div>
      </div>

      <div id="chatFeed" class="chat-feed">
        <ul id="chat" class="chat-list"></ul>
      </div>

      <div class="composer">
        <input id="msg" class="message-input" placeholder="Digite sua mensagem..." maxlength="2000" autocomplete="off">
        <button id="btnPickImage" class="btn-secondary" type="button">Imagem</button>
        <button id="btnEnviar" class="btn-primary" type="button">Enviar</button>
        <input id="chatImageFile" class="hidden-file" type="file" accept="image/*">
      </div>
    </div>
  </section>
</div>

<div id="profileModal" class="modal hidden" aria-hidden="true">
  <div id="profileModalBackdrop" class="modal-backdrop"></div>

  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
    <div class="modal-head">
      <div>
        <h2 id="profileTitle">Editar perfil</h2>
        <p>Troque sua foto e altere a senha. Para mudar a senha, confirme a senha antiga.</p>
      </div>
      <button id="btnCloseProfile" class="btn-secondary" type="button" style="width:auto; padding:12px 16px;">Fechar</button>
    </div>

    <div class="modal-grid">
      <section class="profile-section">
        <h3>Foto do perfil</h3>

        <label for="profileAvatarUrl">Avatar URL opcional</label>
        <input id="profileAvatarUrl" placeholder="https://..." maxlength="500" autocomplete="off">

        <div class="upload-row">
          <button id="btnPickProfileAvatar" class="btn-secondary" type="button">Escolher imagem</button>
          <button id="btnClearProfileAvatar" class="btn-secondary" type="button">Limpar imagem</button>
          <input id="profileAvatarFile" class="hidden-file" type="file" accept="image/*">
        </div>

        <div class="preview-row">
          <div id="profileAvatarPreview" class="avatar" tabindex="0">?</div>
          <div class="subtle">
            Se escolher um arquivo, ele substitui a URL ao salvar. Se colar uma imagem, ela também substitui a URL.
          </div>
        </div>

        <button id="btnSaveProfileAvatar" class="btn-primary" type="button" style="margin-top:14px;">Salvar foto</button>
      </section>

      <section class="profile-section">
        <h3>Alterar senha</h3>

        <label for="profileCurrentPassword">Senha antiga</label>
        <input id="profileCurrentPassword" type="password" placeholder="Senha atual" maxlength="100" autocomplete="off">

        <label for="profileNewPassword">Nova senha</label>
        <input id="profileNewPassword" type="password" placeholder="Nova senha" maxlength="100" autocomplete="off">

        <label for="profileConfirmPassword">Confirmar nova senha</label>
        <input id="profileConfirmPassword" type="password" placeholder="Repita a nova senha" maxlength="100" autocomplete="off">

        <button id="btnChangePassword" class="btn-primary" type="button" style="margin-top:14px;">Alterar senha</button>

        <div id="profileStatus" class="status-box"></div>
      </section>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="chat.js" defer></script>
</body>
</html>
