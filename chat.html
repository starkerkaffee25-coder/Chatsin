<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat</title>

<style>
:root{
  --bg1:#10131a;
  --bg2:#171c26;
  --card:#1d2430;
  --card2:#151a23;
  --line:#2b3445;
  --text:#f2f5fb;
  --muted:#9aa7bd;
  --green:#40c463;
  --green2:#2ea44f;
  --red:#ff6b6b;
  --blue:#59a7ff;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top, #243043 0%, transparent 42%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.hidden{ display:none !important; }

.shell{
  width:min(1180px, 100%);
  min-height:min(92vh, 920px);
  display:flex;
  align-items:stretch;
  justify-content:center;
}

.panel{
  width:100%;
  background:rgba(29,36,48,.94);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  border-radius:24px;
  overflow:hidden;
  backdrop-filter:blur(8px);
}

.app-panel{
  max-width:1180px;
  display:flex;
  flex-direction:column;
  padding:18px;
}

.app-layout{
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:14px;
  height:calc(92vh - 36px);
  min-height:760px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  background:rgba(21,26,35,.96);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:14px 16px;
}

.user-info{
  display:flex;
  align-items:center;
  gap:12px;
}

.user-meta{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.user-name{
  font-size:17px;
  font-weight:800;
}

.user-sub{
  font-size:13px;
  color:var(--muted);
}

.avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  flex:0 0 64px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg, #4f8cff, #7c4dff);
  border:2px solid rgba(255,255,255,.1);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.chat-feed{
  background:rgba(15,20,29,.98);
  border:1px solid #2a3444;
  border-radius:18px;
  overflow-y:auto;
  padding:14px;
}

.chat-list{
  list-style:none;
  padding:0;
  margin:0;
}

.chat-item{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.05);
  word-break:break-word;
  line-height:1.5;
}

.chat-item:last-child{
  border-bottom:none;
}

.chat-row{
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.chat-avatar{
  width:36px;
  height:36px;
  flex:0 0 36px;
  border-radius:50%;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg, #4f8cff, #7c4dff);
  border:1px solid rgba(255,255,255,.08);
}

.chat-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.chat-body{
  flex:1;
  min-width:0;
}

.chat-name{
  font-weight:800;
  color:#bcd2ff;
}

.composer{
  background:rgba(21,26,35,.96);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:14px;
  display:grid;
  grid-template-columns:1fr 170px;
  gap:12px;
}

input, button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px 14px;
  font-size:15px;
  outline:none;
  box-sizing:border-box;
}

input{
  background:#0f141d;
  color:var(--text);
  border:1px solid #2a3444;
}

input:focus{
  border-color:#4b89ff;
  box-shadow:0 0 0 3px rgba(73,132,255,.18);
}

button{
  cursor:pointer;
  font-weight:700;
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
}

.btn-primary{
  background:linear-gradient(180deg, var(--green), var(--green2));
  color:#fff;
}

.btn-danger{
  background:linear-gradient(180deg, #ff7a7a, #ff5b5b);
  color:#fff;
}

.message-input{
  min-height:52px;
}

@media (max-width: 820px){
  .composer{
    grid-template-columns:1fr;
  }

  .app-layout{
    min-height:82vh;
  }
}
</style>
</head>
<body>

<div class="shell">
  <section id="appView" class="panel app-panel">
    <div class="app-layout">
      <div class="topbar">
        <div class="user-info">
          <div id="headerAvatar" class="avatar">?</div>
          <div class="user-meta">
            <div id="currentName" class="user-name">Usuário</div>
            <div class="user-sub">Conectado</div>
          </div>
        </div>
        <button id="btnLogout" class="btn-danger" style="width:auto; padding:12px 16px;">Sair</button>
      </div>

      <div id="chatFeed" class="chat-feed">
        <ul id="chat" class="chat-list"></ul>
      </div>

      <div class="composer">
        <input id="msg" class="message-input" placeholder="Digite sua mensagem..." maxlength="2000">
        <button id="btnEnviar" class="btn-primary">Enviar</button>
      </div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="chat.js" defer></script>
</body>
</html>
