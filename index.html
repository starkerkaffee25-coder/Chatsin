<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat</title>

<style>
:root{
  --bg1:#10131a;
  --bg2:#171c26;
  --card:#1d2430;
  --card2:#151a23;
  --line:#2b3445;
  --text:#f2f5fb;
  --muted:#9aa7bd;
  --green:#40c463;
  --green2:#2ea44f;
  --red:#ff6b6b;
  --blue:#59a7ff;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top, #243043 0%, transparent 42%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.hidden{ display:none !important; }

.shell{
  width:min(1180px, 100%);
  min-height:min(92vh, 920px);
  display:flex;
  align-items:stretch;
  justify-content:center;
}

.panel{
  width:100%;
  background:rgba(29,36,48,.94);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  border-radius:24px;
  overflow:hidden;
  backdrop-filter:blur(8px);
}

.auth-panel{
  max-width:760px;
  margin:auto;
  padding:28px;
}

.auth-grid{
  display:grid;
  grid-template-columns:1.15fr .85fr;
  gap:24px;
  align-items:start;
}

.hero{
  padding:8px 0 0;
}

.hero h1{
  margin:0 0 10px;
  font-size:34px;
}

.hero p{
  margin:0;
  color:var(--muted);
  line-height:1.6;
}

.form-card{
  background:rgba(21,26,35,.9);
  border:1px solid rgba(255,255,255,.06);
  border-radius:20px;
  padding:18px;
}

label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin:12px 0 6px;
}

input, button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px 14px;
  font-size:15px;
  outline:none;
}

input{
  background:#0f141d;
  color:var(--text);
  border:1px solid #2a3444;
}

input:focus{
  border-color:#4b89ff;
  box-shadow:0 0 0 3px rgba(73,132,255,.18);
}

button{
  cursor:pointer;
  font-weight:700;
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
}

.btn-primary{
  background:linear-gradient(180deg, var(--green), var(--green2));
  color:#fff;
}

.btn-secondary{
  background:#263143;
  color:var(--text);
  border:1px solid #334155;
}

.btn-danger{
  background:linear-gradient(180deg, #ff7a7a, #ff5b5b);
  color:#fff;
}

.subtle{
  font-size:13px;
  color:var(--muted);
  margin-top:10px;
}

.preview-row{
  display:flex;
  gap:14px;
  align-items:center;
  margin-top:16px;
}

.avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  flex:0 0 64px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg, #4f8cff, #7c4dff);
  border:2px solid rgba(255,255,255,.1);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.system-box{
  margin-top:18px;
  background:#0f141d;
  border:1px solid #2a3444;
  border-radius:18px;
  padding:14px;
}

.system-title{
  font-size:13px;
  color:var(--muted);
  margin:0 0 10px;
}

.system-feed{
  height:220px;
  overflow-y:auto;
  padding:0;
  margin:0;
  list-style:none;
}

.system-feed li{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.05);
  color:#d7e2f5;
  font-size:14px;
  line-height:1.45;
}

.app-panel{
  max-width:1180px;
  display:flex;
  flex-direction:column;
  padding:18px;
}

.app-layout{
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:14px;
  height:calc(92vh - 36px);
  min-height:760px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  background:rgba(21,26,35,.96);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:14px 16px;
}

.user-info{
  display:flex;
  align-items:center;
  gap:12px;
}

.user-meta{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.user-name{
  font-size:17px;
  font-weight:800;
}

.user-sub{
  font-size:13px;
  color:var(--muted);
}

.chat-feed{
  background:rgba(15,20,29,.98);
  border:1px solid #2a3444;
  border-radius:18px;
  overflow-y:auto;
  padding:14px;
}

.chat-list{
  list-style:none;
  padding:0;
  margin:0;
}

.chat-item{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.05);
  word-break:break-word;
  line-height:1.5;
}

.chat-item:last-child{
  border-bottom:none;
}

.chat-row{
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.chat-avatar{
  width:36px;
  height:36px;
  flex:0 0 36px;
  border-radius:50%;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg, #4f8cff, #7c4dff);
  border:1px solid rgba(255,255,255,.08);
}

.chat-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.chat-body{
  flex:1;
  min-width:0;
}

.chat-name{
  font-weight:800;
  color:#bcd2ff;
}

.composer{
  background:rgba(21,26,35,.96);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:14px;
  display:grid;
  grid-template-columns:1fr 170px;
  gap:12px;
}

.message-input{
  min-height:52px;
}

@media (max-width: 820px){
  .auth-grid{
    grid-template-columns:1fr;
  }

  .composer{
    grid-template-columns:1fr;
  }

  .app-layout{
    min-height:82vh;
  }
}
</style>
</head>
<body>

<div class="shell">
  <section id="authView" class="panel auth-panel">
    <div class="auth-grid">
      <div class="hero">
        <h1>Chat simples</h1>
        <p>
          Entre com nome e senha, opcionalmente adicione uma imagem de perfil por URL,
          e o chat só aparece depois do login.
        </p>

        <div class="system-box">
          <div class="system-title">Sistema</div>
          <ul id="systemFeed" class="system-feed"></ul>
        </div>
      </div>

      <div class="form-card">
        <label for="nome">Nome</label>
        <input id="nome" placeholder="Nome (máx. 150)" maxlength="150">

        <label for="senha">Senha</label>
        <input id="senha" type="password" placeholder="Senha (máx. 100)" maxlength="100">

        <label for="avatarUrl">Avatar URL opcional</label>
        <input id="avatarUrl" placeholder="https://..." maxlength="500">

        <div class="preview-row">
          <div id="avatarPreview" class="avatar">?</div>
          <div class="subtle">
            A imagem pode ser um link direto. Se estiver vazio, aparece um avatar padrão.
          </div>
        </div>

        <div style="display:grid; gap:10px; margin-top:16px;">
          <button id="btnReg" class="btn-secondary">Registrar</button>
          <button id="btnLogin" class="btn-primary">Login</button>
        </div>
      </div>
    </div>
  </section>

  <section id="appView" class="panel app-panel hidden">
    <div class="app-layout">
      <div class="topbar">
        <div class="user-info">
          <div id="headerAvatar" class="avatar">?</div>
          <div class="user-meta">
            <div id="currentName" class="user-name">Usuário</div>
            <div class="user-sub">Conectado</div>
          </div>
        </div>
        <button id="btnLogout" class="btn-danger" style="width:auto; padding:12px 16px;">Sair</button>
      </div>

      <div id="chatFeed" class="chat-feed">
        <ul id="chat" class="chat-list"></ul>
      </div>

      <div class="composer">
        <input id="msg" class="message-input" placeholder="Digite sua mensagem..." maxlength="2000" disabled>
        <button id="btnEnviar" class="btn-primary" disabled>Enviar</button>
      </div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const nomeInput = document.getElementById("nome");
const senhaInput = document.getElementById("senha");
const avatarUrlInput = document.getElementById("avatarUrl");
const msgInput = document.getElementById("msg");

const authView = document.getElementById("authView");
const appView = document.getElementById("appView");

const systemFeed = document.getElementById("systemFeed");
const chatFeed = document.getElementById("chatFeed");
const chat = document.getElementById("chat");

const avatarPreview = document.getElementById("avatarPreview");
const headerAvatar = document.getElementById("headerAvatar");
const currentName = document.getElementById("currentName");

const btnReg = document.getElementById("btnReg");
const btnLogin = document.getElementById("btnLogin");
const btnLogout = document.getElementById("btnLogout");
const btnEnviar = document.getElementById("btnEnviar");

const db = window.supabase.createClient(
  "https://iehauyofnfshyusjbkvn.supabase.co",
  "sb_publishable_1qmZEoIh-pufPGWwhMl_KA_re4u-eyp"
);

let usuarioLogado = null;
let usuarioLogadoId = null;
let avatarLogado = null;
let oldestLoadedId = null;
let loadingOlder = false;

const PAGE_SIZE = 25;

function isNearBottom(el) {
  return (el.scrollHeight - el.scrollTop - el.clientHeight) < 60;
}

function scrollToBottom(el) {
  el.scrollTop = el.scrollHeight;
}

function initials(name) {
  const n = (name || "").trim();
  if (!n) return "?";
  const parts = n.split(/\s+/).filter(Boolean);
  const a = parts[0]?.[0] || "";
  const b = parts[1]?.[0] || "";
  return (a + b).toUpperCase();
}

function setAvatar(el, name, url) {
  el.innerHTML = "";

  if (url && url.trim()) {
    const img = document.createElement("img");
    img.src = url.trim();
    img.alt = name || "avatar";
    img.onerror = () => {
      el.innerHTML = initials(name);
    };
    el.appendChild(img);
  } else {
    el.textContent = initials(name);
  }
}

function showSystemMessage(text) {
  const shouldScroll = isNearBottom(systemFeed);

  const li = document.createElement("li");
  li.textContent = text;
  systemFeed.appendChild(li);

  if (shouldScroll) scrollToBottom(systemFeed);
}

function buildMessageNode(nome, avatarUrl, texto) {
  const li = document.createElement("li");
  li.className = "chat-item";

  const row = document.createElement("div");
  row.className = "chat-row";

  const avatar = document.createElement("div");
  avatar.className = "chat-avatar";

  if (avatarUrl && avatarUrl.trim()) {
    const img = document.createElement("img");
    img.src = avatarUrl.trim();
    img.alt = nome || "avatar";
    img.onerror = () => {
      avatar.textContent = initials(nome);
    };
    avatar.appendChild(img);
  } else {
    avatar.textContent = initials(nome);
  }

  const body = document.createElement("div");
  body.className = "chat-body";
  body.innerHTML = `<span class="chat-name">${escapeHtml(nome)}:</span> ${escapeHtml(texto)}`;

  row.appendChild(avatar);
  row.appendChild(body);
  li.appendChild(row);

  return li;
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function openApp() {
  authView.classList.add("hidden");
  appView.classList.remove("hidden");
  msgInput.disabled = false;
  btnEnviar.disabled = false;
}

function closeApp() {
  appView.classList.add("hidden");
  authView.classList.remove("hidden");
  msgInput.disabled = true;
  btnEnviar.disabled = true;
}

async function carregarHistoricoInicial() {
  if (!usuarioLogadoId) return;

  const { data, error } = await db
    .from("mensagens")
    .select("*")
    .order("id", { ascending: false })
    .limit(PAGE_SIZE);

  if (error) {
    showSystemMessage("Erro ao carregar histórico.");
    return;
  }

  chat.innerHTML = "";

  if (!data || data.length === 0) {
    oldestLoadedId = null;
    return;
  }

  const ordered = data.slice().reverse();
  ordered.forEach(m => {
    chat.appendChild(buildMessageNode(m.nome, m.avatar_url, m.texto));
  });

  oldestLoadedId = ordered[0].id;
  scrollToBottom(chatFeed);
}

async function carregarMaisAntigas() {
  if (!usuarioLogadoId || loadingOlder || oldestLoadedId === null) return;

  loadingOlder = true;

  const previousScrollHeight = chatFeed.scrollHeight;
  const previousScrollTop = chatFeed.scrollTop;

  const { data, error } = await db
    .from("mensagens")
    .select("*")
    .lt("id", oldestLoadedId)
    .order("id", { ascending: false })
    .limit(PAGE_SIZE);

  if (!error && data && data.length > 0) {
    const ordered = data.slice().reverse();

    ordered.forEach(m => {
      chat.prepend(buildMessageNode(m.nome, m.avatar_url, m.texto));
    });

    oldestLoadedId = ordered[0].id;
    chatFeed.scrollTop = chatFeed.scrollHeight - previousScrollHeight + previousScrollTop;
  }

  loadingOlder = false;
}

avatarUrlInput.addEventListener("input", () => {
  const nome = nomeInput.value.trim() || "?";
  setAvatar(avatarPreview, nome, avatarUrlInput.value);
});

nomeInput.addEventListener("input", () => {
  setAvatar(avatarPreview, nomeInput.value.trim(), avatarUrlInput.value);
});

btnReg.onclick = async () => {
  const nome = nomeInput.value.trim();
  const senha = senhaInput.value.trim();
  const avatar_url = avatarUrlInput.value.trim() || null;

  if (!nome || !senha) {
    showSystemMessage("Nome e senha são obrigatórios.");
    return;
  }

  if (nome.length > 150) {
    showSystemMessage("Nome muito longo. Máximo de 150 caracteres.");
    return;
  }

  if (senha.length > 100) {
    showSystemMessage("Senha muito longa. Máximo de 100 caracteres.");
    return;
  }

  const { error } = await db.from("usuarios").insert({
    nome,
    senha,
    avatar_url
  });

  if (error) {
    showSystemMessage("Erro ao registrar: " + error.message);
  } else {
    showSystemMessage("Usuário registrado com sucesso.");
  }
};

btnLogin.onclick = async () => {
  const nome = nomeInput.value.trim();
  const senha = senhaInput.value.trim();

  if (!nome || !senha) {
    showSystemMessage("Nome e senha são obrigatórios.");
    return;
  }

  const { data, error } = await db
    .from("usuarios")
    .select("id, nome, senha, avatar_url")
    .eq("nome", nome)
    .maybeSingle();

  if (error || !data) {
    showSystemMessage("Login inválido.");
    return;
  }

  if (data.senha !== senha) {
    showSystemMessage("Senha incorreta.");
    return;
  }

  usuarioLogado = nome;
  usuarioLogadoId = data.id;
  avatarLogado = data.avatar_url || null;

  currentName.textContent = nome;
  setAvatar(headerAvatar, nome, avatarLogado);

  openApp();
  chat.innerHTML = "";
  oldestLoadedId = null;

  await carregarHistoricoInicial();
  showSystemMessage("Logado como " + nome);
};

btnLogout.onclick = () => {
  usuarioLogado = null;
  usuarioLogadoId = null;
  avatarLogado = null;
  chat.innerHTML = "";
  oldestLoadedId = null;
  msgInput.value = "";
  closeApp();
  showSystemMessage("Faça login para ver o chat.");
};

btnEnviar.onclick = async () => {
  if (!usuarioLogado || !usuarioLogadoId) {
    showSystemMessage("Faça login primeiro.");
    return;
  }

  const texto = msgInput.value.trim();

  if (!texto) {
    showSystemMessage("Mensagem vazia não pode ser enviada.");
    return;
  }

  const { error } = await db.from("mensagens").insert({
    usuario_id: usuarioLogadoId,
    nome: usuarioLogado,
    avatar_url: avatarLogado,
    texto
  });

  if (error) {
    showSystemMessage("Erro ao enviar mensagem: " + error.message);
  } else {
    msgInput.value = "";
  }
};

db.channel("chat")
  .on("postgres_changes", {
    event: "INSERT",
    schema: "public",
    table: "mensagens"
  }, (payload) => {
    if (!usuarioLogadoId) return;

    const shouldScroll = isNearBottom(chatFeed);
    chat.appendChild(buildMessageNode(
      payload.new.nome,
      payload.new.avatar_url,
      payload.new.texto
    ));

    if (shouldScroll) {
      scrollToBottom(chatFeed);
    }
  })
  .subscribe((status) => {
    console.log("Realtime status:", status);
  });

chatFeed.addEventListener("scroll", async () => {
  if (chatFeed.scrollTop <= 0) {
    await carregarMaisAntigas();
  }
});

showSystemMessage("Faça login para abrir o chat.");
setAvatar(avatarPreview, nomeInput.value.trim(), avatarUrlInput.value);
closeApp();
</script>
</body>
</html>
