<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat - Login</title>

<style>
:root{
  --bg1:#10131a;
  --bg2:#171c26;
  --card:#1d2430;
  --card2:#151a23;
  --line:#2b3445;
  --text:#f2f5fb;
  --muted:#9aa7bd;
  --green:#40c463;
  --green2:#2ea44f;
  --red:#ff6b6b;
  --blue:#59a7ff;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top, #243043 0%, transparent 42%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.shell{
  width:min(1180px, 100%);
  min-height:min(92vh, 920px);
  display:flex;
  align-items:stretch;
  justify-content:center;
}

.panel{
  width:100%;
  background:rgba(29,36,48,.94);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  border-radius:24px;
  overflow:hidden;
  backdrop-filter:blur(8px);
}

.auth-panel{
  max-width:760px;
  margin:auto;
  padding:28px;
}

.auth-grid{
  display:grid;
  grid-template-columns:1.15fr .85fr;
  gap:24px;
  align-items:start;
}

.hero{
  padding:8px 0 0;
}

.hero h1{
  margin:0 0 10px;
  font-size:34px;
}

.hero p{
  margin:0;
  color:var(--muted);
  line-height:1.6;
}

.form-card{
  background:rgba(21,26,35,.9);
  border:1px solid rgba(255,255,255,.06);
  border-radius:20px;
  padding:18px;
}

label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin:12px 0 6px;
}

input, button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px 14px;
  font-size:15px;
  outline:none;
}

input{
  background:#0f141d;
  color:var(--text);
  border:1px solid #2a3444;
}

input:focus{
  border-color:#4b89ff;
  box-shadow:0 0 0 3px rgba(73,132,255,.18);
}

button{
  cursor:pointer;
  font-weight:700;
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
}

.btn-primary{
  background:linear-gradient(180deg, var(--green), var(--green2));
  color:#fff;
}

.btn-secondary{
  background:#263143;
  color:var(--text);
  border:1px solid #334155;
}

.subtle{
  font-size:13px;
  color:var(--muted);
  margin-top:10px;
}

.preview-row{
  display:flex;
  gap:14px;
  align-items:center;
  margin-top:16px;
}

.avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  flex:0 0 64px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg, #4f8cff, #7c4dff);
  border:2px solid rgba(255,255,255,.1);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.system-box{
  margin-top:18px;
  background:#0f141d;
  border:1px solid #2a3444;
  border-radius:18px;
  padding:14px;
}

.system-title{
  font-size:13px;
  color:var(--muted);
  margin:0 0 10px;
}

.system-feed{
  height:220px;
  overflow-y:auto;
  padding:0;
  margin:0;
  list-style:none;
}

.system-feed li{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.05);
  color:#d7e2f5;
  font-size:14px;
  line-height:1.45;
}

@media (max-width: 820px){
  .auth-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="shell">
  <section class="panel auth-panel">
    <div class="auth-grid">
      <div class="hero">
        <h1>Chat simples</h1>
        <p>
          Entre com nome e senha, opcionalmente adicione uma imagem de perfil por URL,
          e o chat só aparece depois do login.
        </p>

        <div class="system-box">
          <div class="system-title">Sistema</div>
          <ul id="systemFeed" class="system-feed"></ul>
        </div>
      </div>

      <div class="form-card">
        <label for="nome">Nome</label>
        <input id="nome" placeholder="Nome (máx. 150)" maxlength="150">

        <label for="senha">Senha</label>
        <input id="senha" type="password" placeholder="Senha (máx. 100)" maxlength="100">

        <label for="avatarUrl">Avatar URL opcional</label>
        <input id="avatarUrl" placeholder="https://..." maxlength="500">

        <div class="preview-row">
          <div id="avatarPreview" class="avatar">?</div>
          <div class="subtle">
            A imagem pode ser um link direto. Se estiver vazio, aparece um avatar padrão.
          </div>
        </div>

        <div style="display:grid; gap:10px; margin-top:16px;">
          <button id="btnReg" class="btn-secondary">Registrar</button>
          <button id="btnLogin" class="btn-primary">Login</button>
        </div>
      </div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="login.js" defer></script>
</body>
</html>
