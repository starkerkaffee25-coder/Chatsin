<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jogos</title>

<style>
:root{
  --bg1:#10131a;
  --bg2:#171c26;
  --card:#1d2430;
  --card2:#151a23;
  --line:#2b3445;
  --text:#f2f5fb;
  --muted:#9aa7bd;
  --green:#40c463;
  --green2:#2ea44f;
  --red:#ff6b6b;
  --blue:#59a7ff;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top, #243043 0%, transparent 42%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.shell{
  width:min(1180px, 100%);
  min-height:min(92vh, 920px);
  display:flex;
  align-items:stretch;
  justify-content:center;
}

.panel{
  width:100%;
  background:rgba(29,36,48,.94);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  border-radius:24px;
  overflow:hidden;
  backdrop-filter:blur(8px);
}

.games-panel{
  max-width:1180px;
  display:flex;
  flex-direction:column;
  padding:18px;
}

.games-layout{
  display:grid;
  grid-template-rows:auto auto 1fr;
  gap:14px;
  height:calc(92vh - 36px);
  min-height:760px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  background:rgba(21,26,35,.96);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:14px 16px;
}

.user-info{
  display:flex;
  align-items:center;
  gap:12px;
}

.user-meta{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.user-name{
  font-size:17px;
  font-weight:800;
}

.user-sub{
  font-size:13px;
  color:var(--muted);
}

.avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  flex:0 0 64px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg, #4f8cff, #7c4dff);
  border:2px solid rgba(255,255,255,.1);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.topbar-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.games-tabs{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:12px;
  background:rgba(21,26,35,.96);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
}

.game-tab{
  width:auto;
  min-width:140px;
  flex:0 0 auto;
}

.game-tab.active{
  background:linear-gradient(180deg, var(--green), var(--green2));
  color:#fff;
  border:1px solid transparent;
}

.games-main{
  display:grid;
  grid-template-columns:360px 1fr;
  gap:14px;
  min-height:0;
}

.section-card{
  background:rgba(15,20,29,.98);
  border:1px solid #2a3444;
  border-radius:18px;
  padding:16px;
  min-height:0;
  display:flex;
  flex-direction:column;
}

.section-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

.section-head h2,
.section-head h3{
  margin:0 0 6px;
}

.section-head p{
  margin:0;
  color:var(--muted);
  line-height:1.5;
}

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:700;
  background:#263143;
  color:var(--text);
  border:1px solid #334155;
  white-space:nowrap;
}

.badge.waiting{
  background:rgba(64,196,99,.14);
  color:#9ff0b2;
  border-color:rgba(64,196,99,.22);
}

.badge.started{
  background:rgba(89,167,255,.14);
  color:#b9d7ff;
  border-color:rgba(89,167,255,.22);
}

label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin:12px 0 6px;
}

input, select, button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px 14px;
  font-size:15px;
  outline:none;
}

input, select{
  background:#0f141d;
  color:var(--text);
  border:1px solid #2a3444;
}

input:focus, select:focus{
  border-color:#4b89ff;
  box-shadow:0 0 0 3px rgba(73,132,255,.18);
}

button{
  cursor:pointer;
  font-weight:700;
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
}

.btn-primary{
  background:linear-gradient(180deg, var(--green), var(--green2));
  color:#fff;
}

.btn-secondary{
  background:#263143;
  color:var(--text);
  border:1px solid #334155;
}

.btn-danger{
  background:linear-gradient(180deg, #ff7a7a, #ff5b5b);
  color:#fff;
}

.status-box{
  margin-top:12px;
  color:#d7e2f5;
  font-size:13px;
  min-height:20px;
  line-height:1.45;
}

.note-box{
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}

.lobby-list{
  display:grid;
  gap:12px;
  overflow-y:auto;
  min-height:0;
  padding-right:4px;
}

.lobby-card{
  background:#0f141d;
  border:1px solid #2a3444;
  border-radius:18px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.lobby-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}

.lobby-title{
  font-size:17px;
  font-weight:800;
  margin:0 0 4px;
}

.lobby-meta{
  font-size:13px;
  color:var(--muted);
  line-height:1.45;
}

.players-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.player-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px 6px 6px;
  border-radius:999px;
  background:#151c27;
  border:1px solid rgba(255,255,255,.06);
  color:var(--text);
  font-size:13px;
}

.mini-avatar{
  width:22px;
  height:22px;
  border-radius:50%;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg, #4f8cff, #7c4dff);
  border:1px solid rgba(255,255,255,.08);
  flex:0 0 22px;
}

.mini-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.lobby-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.lobby-actions button{
  width:auto;
  min-width:140px;
  padding:12px 14px;
}

.empty-state{
  padding:24px 16px;
  text-align:center;
  color:var(--muted);
  border:1px dashed rgba(255,255,255,.08);
  border-radius:18px;
  background:rgba(255,255,255,.02);
  line-height:1.5;
}

@media (max-width: 980px){
  .games-main{
    grid-template-columns:1fr;
  }
}

@media (max-width: 820px){
  .topbar{
    flex-direction:column;
    align-items:stretch;
  }

  .games-layout{
    min-height:82vh;
  }

  .section-head{
    flex-direction:column;
    align-items:stretch;
  }
}
</style>
</head>
<body>

<div class="shell">
  <section class="panel games-panel">
    <div class="games-layout">
      <div class="topbar">
        <div class="user-info">
          <div id="headerAvatar" class="avatar">?</div>
          <div class="user-meta">
            <div id="currentName" class="user-name">Usuário</div>
            <div id="currentSub" class="user-sub">Conectado · Jogos</div>
          </div>
        </div>

        <div class="topbar-actions">
          <button id="btnBackChat" class="btn-secondary" type="button" style="width:auto; padding:12px 16px;">Voltar ao chat</button>
        </div>
      </div>

      <div id="gamesTabs" class="games-tabs"></div>

      <div class="games-main">
        <section class="section-card">
          <div class="section-head">
            <div>
              <h2 id="selectedGameTitle">Jogos</h2>
              <p id="selectedGameDescription">Escolha uma aba para ver e criar lobbys.</p>
            </div>
            <div id="selectedGameBadge" class="badge">modular</div>
          </div>

          <label for="lobbyName">Nome do lobby</label>
          <input id="lobbyName" placeholder="Ex.: Mesa dos amigos" maxlength="80" autocomplete="off">

          <label for="lobbyMaxPlayers">Capacidade</label>
          <select id="lobbyMaxPlayers"></select>

          <button id="btnCreateLobby" class="btn-primary" type="button" style="margin-top:14px;">Criar lobby</button>

          <div id="gamesStatus" class="status-box" aria-live="polite"></div>
          <div class="note-box">
            Lobbys ficam visíveis para todos os jogadores conectados. Quando o lobby atingir a capacidade máxima, o criador poderá iniciar a partida.
          </div>
        </section>

        <section class="section-card">
          <div class="section-head">
            <div>
              <h3>Lobbys aguardando</h3>
              <p id="lobbyHint">Lobby disponíveis para entrada.</p>
            </div>
            <button id="btnRefreshLobbies" class="btn-secondary" type="button" style="width:auto; padding:12px 16px;">Atualizar</button>
          </div>

          <div id="lobbyList" class="lobby-list"></div>
        </section>
      </div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="games.js" defer></script>
</body>
</html>
